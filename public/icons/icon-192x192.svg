<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="192" height="192" fill="url(#bgGradient)" rx="45"/>
  
  <!-- Book icon -->
  <g transform="translate(48, 46)">
    <!-- Left page -->
    <rect x="0" y="0" width="40" height="60" fill="#fbbf24" rx="4" opacity="0.95"/>
    <!-- Right page -->
    <rect x="44" y="0" width="40" height="60" fill="#fbbf24" rx="4"/>
    <!-- Spine -->
    <rect x="38" y="5" width="8" height="50" fill="#f59e0b"/>
    <!-- Lines on left page -->
    <line x1="8" y1="15" x2="32" y2="15" stroke="#0a0a1a" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="25" x2="32" y2="25" stroke="#0a0a1a" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="35" x2="32" y2="35" stroke="#0a0a1a" stroke-width="2" stroke-linecap="round"/>
    <!-- Lines on right page -->
    <line x1="52" y1="15" x2="76" y2="15" stroke="#0a0a1a" stroke-width="2" stroke-linecap="round"/>
    <line x1="52" y1="25" x2="76" y2="25" stroke="#0a0a1a" stroke-width="2" stroke-linecap="round"/>
    <line x1="52" y1="35" x2="76" y2="35" stroke="#0a0a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Checkmark circle at bottom right -->
  <g transform="translate(110, 120)">
    <circle cx="20" cy="20" r="22" fill="#10b981" opacity="0.98"/>
    <!-- Checkmark -->
    <path d="M 12 20 L 18 26 L 28 16" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
